<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RAG-консультант</title>
    <style>
        :root {
            --bg-main: #e6f0fa;
            --bg-input-area: #fff;
            --bg-buttom: #3a6ea5;
            --bg-user: #3a6ea5;
            --bg-bot: #b0c4de;
            --font-user: #fff;
            --font-bot: #000;
            --font-input-area: #000;
            --font-button: #fff;
            --border-input-area: #3a6ea5;
            --hover-button: #2e5a85;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg-main);;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: var(--bg-buttom);
            color: var(--font-button);
            font-size: 20px;
            font-weight: bold;
            padding: 15px 20px;
            text-align: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-main);
            border: 4px solid #3a6ea5;
            margin: 0;
        }
        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 12px;
            border-radius: 10px;
            line-height: 1.4;
            font-size: 22px;
        }
        .user {
            background: var(--bg-user);
            color: var(--font-user);
            margin-left: auto;
        }
        .bot {
            background: var(--bg-bot);
            color: var(--font-bot);
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: var(--bg-input-area);
            border: 5px solid var(--border-input-area);
            color: var(--font-input-area);
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        button {
            margin-left: 10px;
            padding: 10px 20px;
            border: none;
            background: var(--bg-buttom);
            color: var(--font-button);
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: var(--hover-button);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">Консультант по мерам поддержки</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="query" placeholder="Введите вопрос..." />
        <button onclick="send()">Отправить</button>
    </div>

</div>
<script>
    function addMessage(text, className) {
        const chat = document.getElementById("chat");

        const msg = document.createElement("div");
        msg.className = "message " + className;
        msg.innerText = text;

        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById("query");
        const query = input.value.trim();

        if (!query) return;

        addMessage(query, "user");
        input.value = "";

        addMessage("...", "bot");

        let res;
        try {
            res = await fetch("/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ query })
            });

            const data = await res.json();
            const chat = document.getElementById("chat");
            chat.removeChild(chat.lastChild);
    
            if (!res.ok) {
                addMessage("Ошибка: " + data.detail, "bot")
            }
    
            addMessage(data.answer, "bot");
        } catch (e) {
            const chat = document.getElementById("chat");
            chat.removeChild(chat.lastChild);
            addMessage("Ошибка сети: " + e.message, "bot");
        }
    }
</script>
</body>
</html>
